services:
  - type: web
    name: startmit-workspace
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: INARA_API_KEY
        sync: false
