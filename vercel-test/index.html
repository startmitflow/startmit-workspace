<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StartMit - Vercel Deployed</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
        }
        .container {
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        h1 { font-size: 3em; margin-bottom: 10px; }
        .status { 
            display: inline-block;
            background: #22c55e;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            margin: 20px 0;
        }
        .info {
            text-align: left;
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 10px;
            margin-top: 30px;
        }
        .info h2 { margin-top: 0; }
        .info ul { list-style: none; padding: 0; }
        .info li { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .info li:before { content: "✓ "; color: #22c55e; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 StartMit</h1>
        <div class="status">Vercel Deployment Successful</div>
        <p>Your automated deployment pipeline is working!</p>
        
        <div class="info">
            <h2>Deployment Stack</h2>
            <ul>
                <li>GitHub Repository Connected</li>
                <li>Vercel CLI Authenticated</li>
                <li>Automated Deployments Enabled</li>
                <li>Preview & Production Deployments</li>
                <li>Custom Domain Ready</li>
            </ul>
        </div>
    </div>
</body>
</html>
